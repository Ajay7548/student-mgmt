<!doctype html>
<!--
  index.html
  ---------------------------------------------------------------------------
  The single HTML page that the whole React app is mounted into. Vite injects
  the bundled JavaScript here automatically. React takes over the empty
  <div id="root"> below and renders the entire user interface inside it.
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Management — Secure CRUD</title>
  </head>
  <body>
    <!-- React renders into this element (see src/main.tsx). -->
    <div id="root"></div>

    <!-- The app's entry point. `type="module"` enables modern ES module imports. -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
